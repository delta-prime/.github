<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f9f6f1">
        <animate attributeName="stop-color" values="#f9f6f1;#8e96a3;#f9f6f1" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#8e96a3">
        <animate attributeName="stop-color" values="#8e96a3;#f9f6f1;#8e96a3" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#30363d;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#30363d;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bloom">
      <feGaussianBlur stdDeviation="0" result="blur">
        <animate attributeName="stdDeviation" values="0;3;0" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bloom2">
      <feGaussianBlur stdDeviation="0" result="blur">
        <animate attributeName="stdDeviation" values="0;3;0" dur="6s" repeatCount="indefinite" begin="3s"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="banner-clip">
      <rect width="800" height="200" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#banner-clip)">
    <rect width="800" height="200" fill="url(#bg-grad)"/>

    <!-- Animated grid lines -->
    <g stroke="url(#grid-grad)" stroke-width="1">
      <line x1="0" y1="40" x2="800" y2="40" opacity="0.5"/>
      <line x1="0" y1="80" x2="800" y2="80" opacity="0.3"/>
      <line x1="0" y1="120" x2="800" y2="120" opacity="0.3"/>
      <line x1="0" y1="160" x2="800" y2="160" opacity="0.5"/>
      <line x1="100" y1="0" x2="100" y2="200" opacity="0.2"/>
      <line x1="200" y1="0" x2="200" y2="200" opacity="0.2"/>
      <line x1="600" y1="0" x2="600" y2="200" opacity="0.2"/>
      <line x1="700" y1="0" x2="700" y2="200" opacity="0.2"/>
    </g>

    <!-- Floating particles (Bone White / Frost Iron) -->
    <circle cx="50" cy="30" r="2" fill="#f9f6f1" opacity="0.6">
      <animate attributeName="cy" values="30;50;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="170" r="1.5" fill="#8e96a3" opacity="0.5">
      <animate attributeName="cy" values="170;150;170" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="40" r="2" fill="#f9f6f1" opacity="0.4">
      <animate attributeName="cy" values="40;60;40" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="160" r="1.5" fill="#8e96a3" opacity="0.4">
      <animate attributeName="cy" values="160;140;160" dur="3.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Restored Cognitive Delta logo -->
    <g transform="translate(80, 100)" filter="url(#glow)">
      <!-- Outer segments - three-part delta -->
      <path d="M-30 25 L0 -35 L30 25" fill="none" stroke="url(#accent-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0,150;150,0" dur="2.5s" fill="freeze"/>
      </path>
      <!-- Bottom bar - tech style -->
      <path d="M-30 25 L-8 25 M8 25 L30 25" fill="none" stroke="url(#accent-grad)" stroke-width="3" stroke-linecap="round">
         <animate attributeName="opacity" values="0;1" dur="1s" begin="1.5s" fill="freeze"/>
      </path>
      <!-- Central core node -->
      <circle cx="0" cy="5" r="4" fill="url(#accent-grad)">
        <animate attributeName="r" values="3.5;5;3.5" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
      </circle>
      <!-- Connections to core -->
      <g stroke="url(#accent-grad)" stroke-width="1.2" opacity="0.5">
        <line x1="0" y1="-15" x2="0" y2="-4">
          <animate attributeName="y2" values="-15;-4" dur="0.8s" begin="2.2s" fill="freeze"/>
        </line>
        <line x1="-12" y1="15" x2="-6" y2="8">
          <animate attributeName="x2" values="-12;-6" dur="0.8s" begin="2.2s" fill="freeze"/>
          <animate attributeName="y2" values="15;8" dur="0.8s" begin="2.2s" fill="freeze"/>
        </line>
        <line x1="12" y1="15" x2="6" y2="8">
          <animate attributeName="x2" values="12;6" dur="0.8s" begin="2.2s" fill="freeze"/>
          <animate attributeName="y2" values="15;8" dur="0.8s" begin="2.2s" fill="freeze"/>
        </line>
      </g>
    </g>

    <!-- Main title -->
    <text x="140" y="85" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="42" font-weight="700" fill="#f0f6fc" letter-spacing="-0.02em">ENGRAMMIC</text>

    <!-- Cycling taglines -->
    <text x="140" y="120" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="14" font-weight="500" fill="url(#accent-grad)" letter-spacing="0.1em">
      MEMORY WITHOUT MEANING IS JUST METADATA.
      <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;0.28;0.33;0.61;0.66;0.95;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="140" y="120" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="14" font-weight="500" fill="url(#accent-grad)" letter-spacing="0.1em">
      CONTEXT WITHOUT CURATION IS JUST CLUTTER.
      <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.28;0.33;0.61;0.66;0.95;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="140" y="120" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="14" font-weight="500" fill="url(#accent-grad)" letter-spacing="0.1em">
      RECALL WITHOUT REASON IS JUST RETRIEVAL.
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.28;0.33;0.61;0.66;0.95;1" dur="9s" repeatCount="indefinite"/>
    </text>

    <!-- Decorative line -->
    <line x1="140" y1="140" x2="450" y2="140" stroke="url(#accent-grad)" stroke-width="1" opacity="0.5">
      <animate attributeName="x2" values="140;450" dur="1s" fill="freeze"/>
    </line>

    <!-- Tech tags -->
    <g font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#8b949e">
      <text x="140" y="165">graph-rag</text>
      <text x="220" y="165">bi-temporal</text>
      <text x="310" y="165">mcp</text>
      <text x="360" y="165">memgraph</text>
      <text x="440" y="165">qdrant</text>
    </g>

    <!-- Corner accents -->
    <path d="M0 0 L30 0 L0 30 Z" fill="url(#accent-grad)" opacity="0.15"/>
    <path d="M800 200 L770 200 L800 170 Z" fill="url(#accent-grad)" opacity="0.15"/>
  </g>
</svg>
