<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d29922">
        <animate attributeName="stop-color" values="#d29922;#f0883e;#d29922" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f0883e">
        <animate attributeName="stop-color" values="#f0883e;#d29922;#f0883e" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#30363d;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#30363d;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bloom">
      <feGaussianBlur stdDeviation="0" result="blur">
        <animate attributeName="stdDeviation" values="0;4;0" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bloom2">
      <feGaussianBlur stdDeviation="0" result="blur">
        <animate attributeName="stdDeviation" values="0;4;0" dur="6s" repeatCount="indefinite" begin="3s"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="banner-clip">
      <rect width="800" height="200" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#banner-clip)">
    <rect width="800" height="200" fill="url(#bg-grad)"/>

    <!-- Animated grid lines -->
    <g stroke="url(#grid-grad)" stroke-width="1">
      <line x1="0" y1="40" x2="800" y2="40" opacity="0.5"/>
      <line x1="0" y1="80" x2="800" y2="80" opacity="0.3"/>
      <line x1="0" y1="120" x2="800" y2="120" opacity="0.3"/>
      <line x1="0" y1="160" x2="800" y2="160" opacity="0.5"/>
      <line x1="100" y1="0" x2="100" y2="200" opacity="0.2"/>
      <line x1="200" y1="0" x2="200" y2="200" opacity="0.2"/>
      <line x1="600" y1="0" x2="600" y2="200" opacity="0.2"/>
      <line x1="700" y1="0" x2="700" y2="200" opacity="0.2"/>
    </g>

    <!-- Floating particles -->
    <circle cx="50" cy="30" r="2" fill="#d29922" opacity="0.6">
      <animate attributeName="cy" values="30;50;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="170" r="1.5" fill="#f0883e" opacity="0.5">
      <animate attributeName="cy" values="170;150;170" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="40" r="2" fill="#d29922" opacity="0.4">
      <animate attributeName="cy" values="40;60;40" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="160" r="1.5" fill="#f0883e" opacity="0.4">
      <animate attributeName="cy" values="160;140;160" dur="3.5s" repeatCount="indefinite"/>
    </circle>

    <!-- NEW SHARP LOGO: THE PRIME DELTA -->
    <g transform="translate(80, 100)" filter="url(#glow)">
      <!-- Main structure: Abstract Δ with geometric facets -->
      <path d="M-35 30 L0 -35 L35 30 Z" fill="none" stroke="url(#accent-grad)" stroke-width="4" stroke-linejoin="bevel">
        <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="2s" fill="freeze"/>
      </path>
      <!-- Internal "Cores" -->
      <path d="M-15 15 L0 -15 L15 15 Z" fill="url(#accent-grad)" opacity="0.4">
        <animate attributeName="opacity" values="0;0.4" dur="1.5s" fill="freeze"/>
      </path>
      <!-- Tech accents: Prime tick and corner brackets -->
      <line x1="15" y1="-30" x2="25" y2="-45" stroke="#f0883e" stroke-width="3" stroke-linecap="round">
         <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
      </line>
      <path d="M-40 20 L-40 35 L-25 35" fill="none" stroke="#d29922" stroke-width="1.5" opacity="0.6"/>
      <path d="M40 20 L40 35 L25 35" fill="none" stroke="#d29922" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Main title -->
    <text x="145" y="85" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="44" font-weight="800" fill="#f0f6fc" letter-spacing="-0.03em">DELTA PRIME</text>

    <!-- Cycling taglines -->
    <text x="145" y="120" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="14" font-weight="600" fill="url(#accent-grad)" letter-spacing="0.12em" filter="url(#bloom)">
      COGNITION INFRASTRUCTURE. CONTEXT ROT'S CURE.
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="145" y="120" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="14" font-weight="600" fill="url(#accent-grad)" letter-spacing="0.12em" filter="url(#bloom2)">
      BUILDING THE COGNITIVE BACKBONE FOR AI
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.5;0.9;1" dur="6s" repeatCount="indefinite"/>
    </text>

    <!-- Decorative line -->
    <line x1="145" y1="140" x2="480" y2="140" stroke="url(#accent-grad)" stroke-width="2" opacity="0.6">
      <animate attributeName="x2" values="145;480" dur="1.2s" fill="freeze"/>
    </line>

    <!-- Tech tags -->
    <g font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#8b949e" font-weight="bold">
      <text x="145" y="165">graph-rag</text>
      <text x="230" y="165">bi-temporal</text>
      <text x="325" y="165">mcp</text>
      <text x="375" y="165">memgraph</text>
      <text x="455" y="165">qdrant</text>
    </g>

    <!-- Corner accents -->
    <path d="M0 0 L40 0 L0 40 Z" fill="url(#accent-grad)" opacity="0.2"/>
    <path d="M800 200 L760 200 L800 160 Z" fill="url(#accent-grad)" opacity="0.2"/>
  </g>
</svg>
